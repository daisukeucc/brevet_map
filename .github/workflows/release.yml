# 手動リリース: Fastlane でビルドし、TestFlight / Play internal へアップロード
#
# GitHub Secrets（例・登録済みの名前に合わせています）
#   共通 .env:
#     GOOGLE_MAPS_API_KEY
#     REVENUECAT_ANDROID_API_KEY
#     REVENUECAT_IOS_API_KEY
#
#   Android リリース署名 + Play:
#     ANDROID_KEYSTORE_BASE64
#     ANDROID_KEYSTORE_STORE_PASSWORD
#     ANDROID_KEY_ALIAS
#     ANDROID_KEY_KEY_PASSWORD
#     GOOGLE_CLOUD_SERVICE_ACCOUNT_KEY
#       → サービスアカウント JSON をそのまま、または JSON 全体を base64 した1行
#
#   iOS（TestFlight）— App Store Connect API（アップロード用）:
#     APP_STORE_CONNECT_KEY_ID + APP_STORE_CONNECT_ISSUER_ID + APP_STORE_CONNECT_KEY_CONTENT(.p8 base64)
#     または APP_STORE_CONNECT_API_KEY（JSON）
#
#   iOS コード署名（方法 B・手エクスポート・CI 用）:
#     IOS_DISTRIBUTION_P12_BASE64        Distribution 証明書 .p12 を base64
#     IOS_DISTRIBUTION_P12_PASSWORD
#     IOS_PROVISION_PROFILE_RUNNER_BASE64       メイン com.brevetmap 用 .mobileprovision
#     IOS_PROVISION_PROFILE_SHARE_EXTENSION_BASE64  Share Extension 用
#     IOS_APP_STORE_TEAM_ID              10桁の Team ID（App Store Connect のチーム ID）
#     （任意）IOS_KEYCHAIN_PASSWORD       一時キーチェーン用。未設定時はランダム生成
#
name: Release (Fastlane)

# Node 20 非推奨対策: JS 製アクションを Node 24 で実行（checkout ほか）
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "デプロイするプラットフォーム"
        required: true
        type: choice
        options:
          - android
          - ios
          - both

jobs:
  release-android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set project directory
        id: project-dir
        run: |
          if [ -f pubspec.yaml ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f brevet_map/pubspec.yaml ]; then
            echo "dir=brevet_map" >> $GITHUB_OUTPUT
          else
            echo "Flutter project not found" && exit 1
          fi

      # Fastlane 依存の CFPropertyList 3.x は Ruby < 3.2 のため 3.1 系（3.3 では bundle install 不可）
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.6"
          bundler: "2.5.23"
          bundler-cache: true
          working-directory: ${{ steps.project-dir.outputs.dir }}

      - uses: ./.github/actions/setup-flutter
        with:
          channel: stable
          cache: true

      - name: Create .env from Secrets
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          REVENUECAT_ANDROID_API_KEY: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY: ${{ secrets.REVENUECAT_IOS_API_KEY }}
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          {
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY"
            echo "REVENUECAT_ANDROID_API_KEY=$REVENUECAT_ANDROID_API_KEY"
            echo "REVENUECAT_IOS_API_KEY=$REVENUECAT_IOS_API_KEY"
          } > "$PROJ/.env"

      - name: Inject Android API key
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          mkdir -p "$PROJ/android"
          echo "sdk.dir=$ANDROID_HOME" >> "$PROJ/android/local.properties"
          echo "flutter.sdk=$FLUTTER_ROOT" >> "$PROJ/android/local.properties"
          echo "google.maps.api.key=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> "$PROJ/android/local.properties"

      - name: Decode keystore and key.properties
        env:
          B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_KEY_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          if [ -z "$B64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 が未設定です。" && exit 1
          fi
          # shell の base64 は環境・文字種で invalid input になりやすい。Python で空白/BOM/data URI/URL-safe を吸収してデコードする。
          export PROJ
          python3 <<'PY'
          import base64, os, pathlib, re, sys

          def clean(s: str) -> str:
              s = "".join(s.split())
              if s.startswith("\ufeff"):
                  s = s[1:]
              if s.startswith("\xef\xbb\xbf"):
                  s = s[3:]
              return s

          def pad(s: str) -> str:
              return s + "=" * ((-len(s)) % 4)

          def decode_keystore(b64: str) -> bytes:
              s = clean(b64)
              if not s:
                  raise ValueError("クリーニング後に空です")
              if "base64," in s:
                  s = clean(s.split("base64,", 1)[1])
              p = pad(s)
              try:
                  return base64.b64decode(p, validate=True)
              except Exception:
                  pass
              try:
                  return base64.urlsafe_b64decode(p)
              except Exception:
                  pass
              return base64.b64decode(s, validate=False)

          # app/build.gradle の file(storeFile) は android/app を基準に解決するため app 直下に置く
          out = pathlib.Path(os.environ["PROJ"]) / "android/app/upload-keystore.jks"
          try:
              data = decode_keystore(os.environ["B64"])
          except Exception as e:
              n = len(re.sub(r"\s+", "", os.environ.get("B64", "")))
              print(f"keystore base64 のデコードに失敗しました: {e}", file=sys.stderr)
              print(f"（非空白文字数: {n}）", file=sys.stderr)
              print(
                  "ローカルで jks を1行の標準 base64 にし直し、Secret を貼り替えてください: "
                  "base64 -w0 < android/app/upload-keystore.jks",
                  file=sys.stderr,
              )
              sys.exit(1)
          out.write_bytes(data)
          PY
          printf '%s\n' "storePassword=$STORE_PW" "keyPassword=$KEY_PW" "keyAlias=$ALIAS" "storeFile=upload-keystore.jks" > "$PROJ/android/key.properties"

      - name: Write Play service account JSON
        env:
          GC_KEY: ${{ secrets.GOOGLE_CLOUD_SERVICE_ACCOUNT_KEY }}
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          if [ -z "$GC_KEY" ]; then
            echo "GOOGLE_CLOUD_SERVICE_ACCOUNT_KEY が未設定です。" && exit 1
          fi
          FIRST=$(printf '%s' "$GC_KEY" | head -c 1)
          if [ "$FIRST" = "{" ]; then
            printf '%s' "$GC_KEY" > "$PROJ/android/play-store-key.json"
          else
            printf '%s' "$GC_KEY" | tr -d ' \n\r\t' | base64 -d > "$PROJ/android/play-store-key.json"
          fi

      - name: Bundle install & Fastlane deploy Android
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ github.workspace }}/${{ steps.project-dir.outputs.dir }}/android/play-store-key.json
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          cd "$PROJ"
          bundle install
          cd android && bundle exec fastlane android deploy_internal

  release-ios:
    # App Store Connect は iOS 26 SDK（Xcode 26 以上）でビルドされたバイナリを要求する。
    # macOS 26 ランナーで Xcode 26 系を明示選択する（macos-latest では過去に Xcode 16.x が選ばれることがある）。
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set project directory
        id: project-dir
        run: |
          if [ -f pubspec.yaml ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f brevet_map/pubspec.yaml ]; then
            echo "dir=brevet_map" >> $GITHUB_OUTPUT
          else
            echo "Flutter project not found" && exit 1
          fi

      # release-android と同様（CFPropertyList / fastlane）
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.6"
          bundler: "2.5.23"
          bundler-cache: true
          working-directory: ${{ steps.project-dir.outputs.dir }}

      - uses: ./.github/actions/setup-flutter
        with:
          channel: stable
          cache: true

      - name: Create .env from Secrets
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          REVENUECAT_ANDROID_API_KEY: ${{ secrets.REVENUECAT_ANDROID_API_KEY }}
          REVENUECAT_IOS_API_KEY: ${{ secrets.REVENUECAT_IOS_API_KEY }}
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          {
            echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY"
            echo "REVENUECAT_ANDROID_API_KEY=$REVENUECAT_ANDROID_API_KEY"
            echo "REVENUECAT_IOS_API_KEY=$REVENUECAT_IOS_API_KEY"
          } > "$PROJ/.env"

      - name: Create iOS Secrets.xcconfig
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          mkdir -p "$PROJ/ios/Runner"
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" > "$PROJ/ios/Runner/Secrets.xcconfig"

      # 方法 B: Keychain に Distribution .p12、2 本の App Store 用 .mobileprovision を配置し manual 用 ExportOptions を生成
      - name: Install iOS signing (p12 + provisioning profiles)
        env:
          P12_B64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          P12_PW: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          PROF_RUNNER_B64: ${{ secrets.IOS_PROVISION_PROFILE_RUNNER_BASE64 }}
          PROF_EXT_B64: ${{ secrets.IOS_PROVISION_PROFILE_SHARE_EXTENSION_BASE64 }}
          TEAM_ID: ${{ secrets.IOS_APP_STORE_TEAM_ID }}
          KC_PW: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${P12_B64:-}" ] || [ -z "${P12_PW:-}" ] || [ -z "${PROF_RUNNER_B64:-}" ] || [ -z "${PROF_EXT_B64:-}" ] || [ -z "${TEAM_ID:-}" ]; then
            echo "::error::iOS CI 署名: IOS_DISTRIBUTION_P12_* / IOS_PROVISION_PROFILE_*（Runner・Extension の2本）/ IOS_APP_STORE_TEAM_ID を Secrets に設定してください。"
            exit 1
          fi
          PROJ="${{ steps.project-dir.outputs.dir }}"
          KEYCHAIN_PATH="${RUNNER_TEMP}/ios-ci-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KC_PW:-$(openssl rand -hex 32)}"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -s "$KEYCHAIN_PATH"

          # macOS の base64 は入力が厳密で失敗しやすい。Android keystore 復元と同じ Python デコードを使う。
          decode_secret_b64_to() {
            B64_IN="$1" OUT_PATH="$2" python3 <<'PY'
          import base64, os, pathlib, sys

          def clean(s: str) -> str:
              s = "".join(s.split())
              if s.startswith("\ufeff"):
                  s = s[1:]
              if s.startswith("\xef\xbb\xbf"):
                  s = s[3:]
              return s

          def pad(s: str) -> str:
              return s + "=" * ((-len(s)) % 4)

          def decode(b64: str) -> bytes:
              s = clean(b64)
              if not s:
                  raise ValueError("empty after clean")
              if "base64," in s:
                  s = clean(s.split("base64,", 1)[1])
              p = pad(s)
              try:
                  return base64.b64decode(p, validate=True)
              except Exception:
                  pass
              try:
                  return base64.urlsafe_b64decode(p)
              except Exception:
                  pass
              return base64.b64decode(s, validate=False)

          b64 = os.environ["B64_IN"]
          out = pathlib.Path(os.environ["OUT_PATH"])
          try:
              data = decode(b64)
          except Exception as e:
              print(f"iOS Secret base64 のデコードに失敗: {e}", file=sys.stderr)
              sys.exit(1)
          out.write_bytes(data)
          PY
          }
          decode_secret_b64_to "$P12_B64" /tmp/dist-signing.p12
          security import /tmp/dist-signing.p12 -k "$KEYCHAIN_PATH" -P "$P12_PW" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f /tmp/dist-signing.p12

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          install_profile() {
            local b64="$1"
            local raw="/tmp/prov-$$.mobileprovision"
            decode_secret_b64_to "$b64" "$raw"
            security cms -D -i "$raw" > /tmp/prov-decoded.plist
            local uuid
            uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/prov-decoded.plist)"
            local pname
            pname="$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/prov-decoded.plist)"
            cp "$raw" "$HOME/Library/MobileDevice/Provisioning Profiles/${uuid}.mobileprovision"
            rm -f "$raw"
            printf '%s' "$pname"
          }
          RUNNER_PROF_NAME="$(install_profile "$PROF_RUNNER_B64")"
          EXT_PROF_NAME="$(install_profile "$PROF_EXT_B64")"

          # Fastlane は project_root 基準で相対パスを解決する。brevet_map/ios/... だと二重になるため絶対パスにする
          EXPORT_PLIST="$(cd "$PROJ" && pwd)/ios/ExportOptions-ci.plist"
          export PROJ EXPORT_PLIST RUNNER_PROF_NAME EXT_PROF_NAME
          python3 <<'PY'
          import os
          import pathlib
          import plistlib

          import re

          def normalize_profile_name(s: str) -> str:
              s = (s or "").strip()
              while len(s) >= 2 and s[0] == s[-1] and s[0] in "\"'":
                  s = s[1:-1].strip()
              return s

          team = os.environ["TEAM_ID"]
          path = os.environ["EXPORT_PLIST"]
          runner = normalize_profile_name(os.environ["RUNNER_PROF_NAME"])
          ext = normalize_profile_name(os.environ["EXT_PROF_NAME"])
          data = {
              "method": "app-store",
              "signingStyle": "manual",
              "teamID": team,
              "provisioningProfiles": {
                  "com.brevetmap": runner,
                  "com.brevetmap.Share-Extension": ext,
              },
          }
          with open(path, "wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)

          def provisioning_profile_specifier_xc_line(name: str) -> str:
              # 引用符で常に囲むと Xcode が名前に " を含むものとして誤解釈することがある。
              # 英数字・._-+ のみはクォートなし。それ以外や空白はダブルクォート + エスケープ。
              n = normalize_profile_name(name)
              if re.fullmatch(r"[A-Za-z0-9._+-]+", n):
                  return f"PROVISIONING_PROFILE_SPECIFIER = {n}\n"
              esc = n.replace("\\", "\\\\").replace('"', '\\"')
              return f'PROVISIONING_PROFILE_SPECIFIER = "{esc}"\n'

          def write_ci_signing(xc_path: pathlib.Path, profile_name: str) -> None:
              xc_path.parent.mkdir(parents=True, exist_ok=True)
              xc_path.write_text(
                  "CODE_SIGN_STYLE = Manual\n"
                  'CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution\n'
                  + provisioning_profile_specifier_xc_line(profile_name),
                  encoding="utf-8",
              )

          proj = pathlib.Path(os.environ["PROJ"])
          write_ci_signing(proj / "ios/Flutter/CI-signing-Runner.xcconfig", runner)
          write_ci_signing(proj / "ios/Share Extension/CI-signing-ShareExtension.xcconfig", ext)
          PY
          echo "EXPORT_OPTIONS_PLIST_PATH=$EXPORT_PLIST" >> "$GITHUB_ENV"

      - name: Flutter pub get & CocoaPods
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          cd "$PROJ"
          flutter pub get
          cd ios
          pod install

      # Fastlane の sh 経由だと Xcode/Flutter の失敗ログが折りたたみで見えにくいため、CI ではここでビルドする
      - name: Flutter build IPA
        run: |
          set -euo pipefail
          PROJ="${{ steps.project-dir.outputs.dir }}"
          cd "$PROJ"
          if [ -z "${EXPORT_OPTIONS_PLIST_PATH:-}" ]; then
            echo "::error::EXPORT_OPTIONS_PLIST_PATH が未設定です"
            exit 1
          fi
          if [ ! -f "$EXPORT_OPTIONS_PLIST_PATH" ]; then
            echo "::error::ExportOptions が見つかりません: $EXPORT_OPTIONS_PLIST_PATH"
            exit 1
          fi
          if [ -n "${FLUTTER_ROOT:-}" ] && [ -x "${FLUTTER_ROOT}/bin/flutter" ]; then
            FL_BIN="${FLUTTER_ROOT}/bin/flutter"
          else
            FL_BIN="flutter"
          fi
          echo "Using EXPORT_OPTIONS_PLIST_PATH=$EXPORT_OPTIONS_PLIST_PATH"
          "$FL_BIN" --version
          "$FL_BIN" build ipa --release --export-options-plist="$EXPORT_OPTIONS_PLIST_PATH"

      - name: Bundle install & Fastlane upload (TestFlight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          PROJ="${{ steps.project-dir.outputs.dir }}"
          cd "$PROJ"
          bundle install
          cd ios && bundle exec fastlane ios upload_testflight
